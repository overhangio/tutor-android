# See docs: https://openedx.atlassian.net/wiki/spaces/LEARNER/pages/48792067/App+Configuration+Flags
API_HOST_URL: "{{ "https" if ENABLE_HTTPS else "http" }}://{{ LMS_HOST }}"
APPLICATION_ID: "{{ ANDROID_APP_ID }}"
ENVIRONMENT_DISPLAY_NAME: "{{ ANDROID_ENVIRONMENT_DISPLAY_NAME }}"
URI_SCHEME: "{{ ANDROID_URI_SCHEME }}"
FEEDBACK_EMAIL_ADDRESS: "{{ CONTACT_EMAIL }}"
FAQ_URL: "{{ ANDROID_FAQ_URL }}"
OAUTH_CLIENT_ID: "{{ ANDROID_OAUTH_CLIENT_ID }}"

# Keep empty to hide setting
AGREEMENT_URLS:
  PRIVACY_POLICY_URL: "{{ ANDROID_PRIVACY_POLICY_URL }}"
  COOKIE_POLICY_URL: "{{ ANDROID_COOKIE_POLICY_URL }}"
  DATA_SELL_CONSENT_URL: "{{ ANDROID_DATA_SELL_CONSENT_URL }}"
  TOS_URL: "{{ ANDROID_TOS_URL }}"
  EULA_URL: "{{ ANDROID_EULA_URL }}"
  SUPPORTED_LANGUAGES: {{ ANDROID_SUPPORTED_LANGUAGES }} #en is default language

DISCOVERY:
  TYPE: "{{ ANDROID_DISCOVERY_TYPE }}"
  WEBVIEW:
    BASE_URL: "{{ ANDROID_DISCOVERY_WEBVIEW_BASE_URL }}"
    COURSE_DETAIL_TEMPLATE: "{{ ANDROID_DISCOVERY_WEBVIEW_COURSE_DETAIL_TEMPLATE }}"
    PROGRAM_DETAIL_TEMPLATE: "{{ ANDROID_DISCOVERY_WEBVIEW_PROGRAM_DETAIL_TEMPLATE }}"

PROGRAM:
  TYPE: "{{ ANDROID_PROGRAM_TYPE }}"
  WEBVIEW:
    PROGRAM_URL: "{{ ANDROID_PROGRAM_WEBVIEW_PROGRAM_URL }}"
    PROGRAM_DETAIL_URL_TEMPLATE: "{{ ANDROID_PROGRAM_WEBVIEW_PROGRAM_DETAIL_URL_TEMPLATE }}"

FIREBASE:
  ENABLED: {{ ANDROID_FIREBASE_ENABLED }}
  ANALYTICS_SOURCE: "{{ ANDROID_FIREBASE_ANALYTICS_SOURCE }}" # segment | none
  CLOUD_MESSAGING_ENABLED: {{ ANDROID_FIREBASE_CLOUD_MESSAGING_ENABLED }}
  PROJECT_NUMBER: "{{ ANDROID_FIREBASE_PROJECT_NUMBER }}"
  PROJECT_ID: "{{ ANDROID_FIREBASE_PROJECT_ID }}"
  APPLICATION_ID: "{{ ANDROID_FIREBASE_APPLICATION_ID }}" # App ID field from the Firebase console or mobilesdk_app_id from the google-services.json file.
  API_KEY: "{{ ANDROID_FIREBASE_API_KEY }}"

SEGMENT_IO:
  ENABLED: {{ ANDROID_SEGMENT_IO_ENABLED }}
  SEGMENT_IO_WRITE_KEY: "{{ ANDROID_SEGMENT_IO_WRITE_KEY }}"

BRAZE:
  ENABLED: {{ ANDROID_BRAZE_ENABLED }}
  PUSH_NOTIFICATIONS_ENABLED: {{ ANDROID_BRAZE_PUSH_NOTIFICATIONS_ENABLED }}

GOOGLE:
  ENABLED: {{ ANDROID_GOOGLE_ENABLED }}
  CLIENT_ID: "{{ ANDROID_GOOGLE_CLIENT_ID }}"

MICROSOFT:
  ENABLED: {{ ANDROID_MICROSOFT_ENABLED }}
  CLIENT_ID: "{{ ANDROID_MICROSOFT_CLIENT_ID }}"
  PACKAGE_SIGNATURE: "{{ ANDROID_MICROSOFT_PACKAGE_SIGNATURE }}"

FACEBOOK:
  ENABLED: {{ ANDROID_FACEBOOK_ENABLED }}
  FACEBOOK_APP_ID: "{{ ANDROID_FACEBOOK_APP_ID }}"
  CLIENT_TOKEN: "{{ ANDROID_FACEBOOK_CLIENT_TOKEN }}"

BRANCH:
  ENABLED: {{ ANDROID_BRANCH_ENABLED }}
  KEY: "{{ ANDROID_BRANCH_KEY }}"
  URI_SCHEME: "{{ ANDROID_BRANCH_URI_SCHEME }}"
  HOST: "{{ ANDROID_BRANCH_HOST }}"
  ALTERNATE_HOST: "{{ ANDROID_BRANCH_ALTERNATE_HOST }}"

#Platform names
PLATFORM_NAME: "{{ PLATFORM_NAME }}"
PLATFORM_FULL_NAME: "{{ ANDROID_PLATFORM_FULL_NAME }}"
#App sourceSets dir
THEME_DIRECTORY: "{{ ANDROID_THEME_DIRECTORY }}"
#tokenType enum accepts JWT and BEARER only
TOKEN_TYPE: "{{ ANDROID_TOKEN_TYPE }}"
#feature flag for activating What’s New feature
WHATS_NEW_ENABLED: {{ ANDROID_WHATS_NEW_ENABLED }}
#feature flag enable Social Login buttons
SOCIAL_AUTH_ENABLED: {{ ANDROID_SOCIAL_AUTH_ENABLED }}
#Course navigation feature flags
COURSE_NESTED_LIST_ENABLED: {{ ANDROID_COURSE_NESTED_LIST_ENABLED }}
COURSE_UNIT_PROGRESS_ENABLED: {{ ANDROID_COURSE_UNIT_PROGRESS_ENABLED }}

# Custom values appended by other Tutor plugins. SnakeYAML, used by the Open edX
# Android app, takes the last value when keys are duplicated, so this hook can
# also be used to override any of the values defined above.
{{ patch("android-tutor-yaml") }}
